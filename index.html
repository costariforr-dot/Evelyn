<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicación Pública - Evelyn Fachler</title>
    <!-- React & Babel for Standalone Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} } 
        @keyframes vibrate { 0% { transform: rotate(0deg); } 25% { transform: rotate(3deg); } 50% { transform: rotate(0deg); } 75% { transform: rotate(-3deg); } 100% { transform: rotate(0deg); } }
        @keyframes beat { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        @keyframes breath { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .ani-vibrate { animation: vibrate 0.3s linear infinite; }
        .ani-beat { animation: beat 0.8s ease-in-out infinite; }
        .ani-breath { animation: breath 3s ease-in-out infinite; }
        * { box-sizing:border-box; margin:0; padding:0; } 
        body { margin: 0; font-family: sans-serif; background: #0f0e1a; color: #f0eef8; }
        button { font-family:inherit; outline:none; }
        #root { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const C = {
            bg:       "#0f0e1a",
            mid:      "#1a1830",
            rose:     "#e8a0a8",
            roseDim:  "rgba(232,160,168,0.15)",
            violet:   "#6a5fa0",
            violetDim:"rgba(106,95,160,0.2)",
            silver:   "#c8cdd8",
            text:     "#f0eef8",
            muted:    "#8a86a8",
            dark:     "#0c0b18",
        };

        const a = (delay, visible, extra={}) => ({
            opacity: 0,
            animation: visible ? `fadeUp 0.55s ${delay}s ease forwards` : "none",
            ...extra,
        });

        /* SLIDE 1 */
        function HeroSlide({ visible }) {
            return (
                <div style={{ textAlign:"center", maxWidth:760 }}>
                    <p style={{ ...a(0.1,visible), fontSize:13, letterSpacing:"0.35em", textTransform:"uppercase", color:C.rose, marginBottom:30 }}>Comunicación Pública</p>
                    <div style={{ ...a(0.2,visible), position:"relative", width:180, height:180, margin:"0 auto 40px", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:`1px solid rgba(232,160,168,0.15)` }}/>
                        <div style={{ position:"absolute", inset:16, borderRadius:"50%", border:`1px solid rgba(232,160,168,0.25)` }}/>
                        <div style={{ position:"absolute", inset:32, borderRadius:"50%", border:`1.5px solid ${C.rose}`, background:"radial-gradient(circle, rgba(232,160,168,0.12) 0%, transparent 70%)" }}/>
                        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke={C.rose} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
                            <path d="M9 10a3 3 0 1 1 6 0c0 1.5-1.5 2.5-1.5 4h-3c0-1.5-1.5-2.5-1.5-4z" />
                            <path d="M10.5 15.5h3" />
                            <path d="M11.5 17h1" />
                        </svg>
                    </div>
                    <h1 style={{ ...a(0.35,visible), fontFamily:"Georgia,serif", fontSize:"clamp(38px,6vw,72px)", fontWeight:300, lineHeight:1.1, color:C.text }}>
                        Hablar en público es<br/><em style={{ color:C.rose }}>una habilidad,<br/>no un talento.</em>
                    </h1>
                    <p style={{ ...a(0.6,visible), fontSize:16, color:C.muted, marginTop:32, lineHeight:1.8 }}>
                        Herramientas prácticas para que tu mensaje llegue, impacte y se recuerde.
                    </p>
                </div>
            );
        }

        /* SLIDE 2 */
        const commsCards = [
            { n:"01", label:"Claro", icon:"M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5", desc:"Sin ambigüedades" },
            { n:"02", label:"Comprensible", icon:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z", desc:"Para tu audiencia" },
            { n:"03", label:"Relevante", icon:"M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3", desc:"Con propósito" },
            { n:"04", label:"Impacto", icon:"M13 2L3 14h9l-1 8 10-12h-9l1-8z", desc:"Que se recuerde" },
        ];

        function GridSlide({ visible }) {
            return (
                <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", position:"relative" }}>
                    <div style={{ ...a(0.2, visible), position: "absolute", inset: "-80px", backgroundImage: "url('https://images.stockcake.com/public/0/b/c/0bc2fce9-ad20-4a61-9979-0794ebfaab06_large/speaker-at-conference-stockcake.jpg')", backgroundSize: "cover", backgroundPosition: "center 25%", opacity: 0.3, filter: "grayscale(100%) brightness(0.65)", pointerEvents: "none", zIndex: 0 }} />
                    <div style={{ position:"absolute", inset:0, background: `radial-gradient(circle at center, transparent 10%, ${C.bg} 95%)`, opacity:0.8, zIndex:0 }} />
                    <div style={{ maxWidth:820, width:"100%", position:"relative", zIndex:1 }}>
                        <h2 style={{ ...a(0.05,visible), fontFamily:"Georgia,serif", fontSize:"clamp(28px,4vw,48px)", fontWeight:300, fontStyle:"italic", color:C.rose, marginBottom:40, textAlign:"center" }}>¿Qué es comunicar bien?</h2>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
                            {commsCards.map((c,i) => (
                                <div key={c.n} style={{ ...a(0.15+i*0.1,visible), background:`rgba(12, 11, 24, 0.92)`, border:`1px solid rgba(232,160,168,0.25)`, borderRadius:6, padding:"32px 28px", display:"flex", alignItems:"flex-start", gap:20, backdropFilter: "blur(6px)", WebkitBackdropFilter: "blur(6px)", boxShadow: "0 12px 35px rgba(0,0,0,0.5)" }}>
                                    <div style={{ width:52, height:52, borderRadius:"50%", background:"rgba(232,160,168,0.15)", border:`1px solid rgba(232,160,168,0.3)`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.rose} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={c.icon}/></svg>
                                    </div>
                                    <div>
                                        <div style={{ fontSize:11, letterSpacing:"0.2em", color:C.rose, fontWeight:600, marginBottom:6 }}>{c.n}</div>
                                        <div style={{ fontFamily:"Georgia,serif", fontSize:22, color:C.text, marginBottom:6 }}>{c.label}</div>
                                        <div style={{ fontSize:14, color:C.muted, lineHeight:1.4 }}>{c.desc}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        /* SLIDE 3 */
        function ClaridadSlide({ visible }) {
            const items = [{ label:"Oraciones cortas" }, { label:"Sin tecnicismos innecesarios" }, { label:"Una idea por párrafo" }, { label:"Las pausas" }];
            return (
                <div style={{ maxWidth:740, width:"100%" }}>
                    <span style={{ ...a(0.05,visible), fontSize:11, letterSpacing:"0.25em", textTransform:"uppercase", border:`1px solid rgba(232,160,168,0.4)`, color:C.rose, padding:"5px 14px", display:"inline-block", marginBottom:24 }}>Claridad</span>
                    <h2 style={{ ...a(0.12,visible), fontFamily:"Georgia,serif", fontSize:"clamp(26px,3.5vw,44px)", fontWeight:300, color:C.text, marginBottom:40 }}>Principios básicos</h2>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
                        {items.map((item,i) => (
                            <div key={i} style={{ ...a(0.2+i*0.1,visible), background: "linear-gradient(135deg, rgba(106,95,160,0.12) 0%, rgba(232,160,168,0.06) 100%)", border: "1px solid rgba(232,160,168,0.2)", borderRadius: 4, padding:"32px 28px", display: "flex", flexDirection: "column", gap: 14 }}>
                                <span style={{ fontSize: 12, letterSpacing: "0.22em", color: C.violet }}>{String(i + 1).padStart(2, "0")}</span>
                                <span style={{ fontSize: 20, color: C.text, lineHeight: 1.4 }}>{item.label}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        /* SLIDE 4 */
        const verbalItems = [
            { icon:"M10 5v6a2 2 0 0 0 4 0V5 M12 13v8 M17 6c1.5 1.5 1.5 4.5 0 6 M20.5 3c3 3 3 9 0 12 M7 6c-1.5 1.5-1.5 4.5 0 6 M3.5 3c-3 3-3 9 0 12", label:"Tono", sub:"Adecuado al contexto", num:"01", ani: "ani-vibrate" },
            { icon:"M12 2v20 M9 5v14 M15 5v14 M6 9v6 M18 9v6 M3 11v2 M21 11v2", label:"Ritmo", sub:"Ni muy rápido, ni lento", num:"02", ani: "ani-beat" },
            { icon:"M6 4h4v16H6zM14 4h4v16h-4z", label:"Pausas", sub:"Estratégicas y precisas", num:"03", ani: "ani-breath" },
        ];

        function VerbalSlide({ visible }) {
            return (
                <div style={{ maxWidth:780, width:"100%" }}>
                    <span style={{ ...a(0.05,visible), fontSize:11, letterSpacing:"0.25em", textTransform:"uppercase", border:`1px solid rgba(232,160,168,0.4)`, color:C.rose, padding:"5px 14px", display:"inline-block", marginBottom:24 }}>Verbal</span>
                    <h2 style={{ ...a(0.12,visible), fontFamily:"Georgia,serif", fontSize:"clamp(26px,3.5vw,44px)", fontWeight:300, color:C.text, marginBottom:40 }}>Comunicación verbal</h2>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:18 }}>
                        {verbalItems.map((item,i) => (
                            <div key={i} style={{ ...a(0.2+i*0.12,visible), background:"rgba(106,95,160,0.12)", border:`1px solid rgba(106,95,160,0.25)`, borderRadius:4, padding:"36px 24px", textAlign:"center", position:"relative", overflow:"hidden" }}>
                                <div style={{ position:"absolute", top:12, right:15, fontSize:11, letterSpacing:"0.15em", color:"rgba(106,95,160,0.5)" }}>{item.num}</div>
                                <div className={visible ? item.ani : ""} style={{ width:64, height:64, borderRadius:"50%", background:"rgba(232,160,168,0.1)", border:`1px solid rgba(232,160,168,0.25)`, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 20px" }}>
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={C.rose} strokeWidth="1.8" strokeLinecap="round"><path d={item.icon}/></svg>
                                </div>
                                <div style={{ fontFamily:"Georgia,serif", fontSize:26, color:C.text, marginBottom:10 }}>{item.label}</div>
                                <div style={{ fontSize:14, color:C.muted, lineHeight:1.5 }}>{item.sub}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        /* SLIDE 5 */
        const nonVerbalItems = [
            { n:"01", icon:"M12 9a2 2 0 1 0 0-4 2 2 0 0 0 0 4 M12 9v6 M9 21l3-6 3 6 M12 11l-3 2 1.5 2 M12 11l3 2-1.5 2 M12 1v2M11 2h2 M7.5 3v1.5M6.75 3.75h1.5 M16.5 3v1.5M15.75 3.75h1.5 M5 18A8.5 8.5 0 0 1 5 6 M19 18A8.5 8.5 0 0 0 19 6", label:"Postura", color:C.rose, desc: "Presencia física" },
            { n:"02", icon:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z", label:"Contacto visual", color:"#a09de0", desc: "Conexión con otros" },
            { n:"03", icon:"M8 4H4v4 M16 4h4v4 M8 20H4v-4 M16 20h4v-4 M7 13 Q12 18 17 13", label:"Expresión facial", color:"#e8b4a8", desc: "Sinceridad y emoción" },
            { n:"04", icon:"M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8M6 14v0a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4v-3", label:"Gestos", color:"#c8a0e8", desc: "Apoyo visual al habla" },
        ];

        function NoVerbalSlide({ visible }) {
            return (
                <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", position:"relative" }}>
                    <div style={{ ...a(0.2, visible), position: "absolute", inset: "-80px", backgroundImage: "url('https://www.aces.edu/wp-content/uploads/2021/11/GettyImages-810559690-scaled.jpg')", backgroundSize: "cover", backgroundPosition: "center", opacity: 0.35, filter: "grayscale(100%) brightness(0.65)", pointerEvents: "none", zIndex: 0 }} />
                    <div style={{ position:"absolute", inset:0, background: `radial-gradient(circle at center, transparent 10%, ${C.bg} 95%)`, opacity:0.8, zIndex:0 }} />
                    <div style={{ maxWidth:820, width:"100%", position:"relative", zIndex:1 }}>
                        <div style={{ textAlign: "center", marginBottom: 40 }}>
                            <span style={{ ...a(0.05,visible), fontSize:11, letterSpacing:"0.25em", textTransform:"uppercase", border:`1px solid rgba(232,160,168,0.4)`, color:C.rose, padding:"5px 14px", display:"inline-block", marginBottom:15 }}>No Verbal</span>
                            <h2 style={{ ...a(0.1,visible), fontFamily:"Georgia,serif", fontSize:"clamp(28px,4vw,48px)", fontWeight:300, fontStyle:"italic", color:C.text }}>Presencia y conexión</h2>
                        </div>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
                            {nonVerbalItems.map((c,i) => (
                                <div key={c.n} style={{ ...a(0.15+i*0.1,visible), background:`rgba(12, 11, 24, 0.92)`, border:`1px solid ${c.color}35`, borderRadius:6, padding:"32px 28px", display:"flex", alignItems:"flex-start", gap:20, backdropFilter: "blur(6px)", WebkitBackdropFilter: "blur(6px)", boxShadow: "0 12px 35px rgba(0,0,0,0.5)" }}>
                                    <div style={{ width:52, height:52, borderRadius:"50%", background:`${c.color}15`, border:`1px solid ${c.color}40`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={c.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={c.icon}/></svg>
                                    </div>
                                    <div>
                                        <div style={{ fontSize:11, letterSpacing:"0.2em", color:c.color, fontWeight:600, marginBottom:6 }}>{c.n}</div>
                                        <div style={{ fontFamily:"Georgia,serif", fontSize:22, color:C.text, marginBottom:6 }}>{c.label}</div>
                                        <div style={{ fontSize:14, color:C.muted, lineHeight:1.4 }}>{c.desc}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        /* SLIDE 6 */
        function BreathingSlide({ visible }) {
            const [running, setRunning] = useState(false);
            const [phaseIdx, setPhaseIdx] = useState(0);
            const [count, setCount] = useState(4);
            const [circleScale, setCircleScale] = useState(1.0);
            const PHASES = [{ label:"Inhala", phase:"INHALAR", dur:4, scale:1.48 }, { label:"Sostén", phase:"SOSTENER", dur:4, scale:1.48 }, { label:"Exhala", phase:"EXHALAR", dur:4, scale:1.0 }];
            const intervalRef = useRef(null);
            const tickRef = useRef(0);
            const phaseRef = useRef(0);
            const stop = useCallback(() => { clearInterval(intervalRef.current); setRunning(false); setPhaseIdx(0); setCount(4); setCircleScale(1.0); tickRef.current = 0; phaseRef.current = 0; }, []);
            const start = useCallback(() => { stop(); setRunning(true); phaseRef.current = 0; tickRef.current = 0; setPhaseIdx(0); setCount(4); setCircleScale(1.48); intervalRef.current = setInterval(() => { tickRef.current += 1; const p = PHASES[phaseRef.current]; const remaining = p.dur - tickRef.current; if (remaining <= 0) { phaseRef.current = (phaseRef.current + 1) % 3; tickRef.current = 0; const np = PHASES[phaseRef.current]; setPhaseIdx(phaseRef.current); setCount(np.dur); setCircleScale(np.scale); } else { setCount(remaining); } }, 1000); }, [stop]);
            useEffect(() => () => clearInterval(intervalRef.current), []);
            const p = PHASES[phaseIdx];
            return (
                <div style={{ ...a(0,visible), display:"flex", flexDirection:"column", alignItems:"center", gap:30 }}>
                    <h2 style={{ fontFamily:"Georgia,serif", fontSize:"clamp(30px,4vw,48px)", fontWeight:300, color:C.text }}>Técnica <span style={{ color:C.rose }}>4 – 4 – 4</span></h2>
                    <div style={{ display:"flex", gap:0, alignItems:"center" }}>
                        {PHASES.map((ph,i) => (
                            <div key={i} style={{ display:"flex", alignItems:"center" }}>
                                <div style={{ width:85, height:85, borderRadius:"50%", background: running && phaseIdx===i ? `rgba(232,160,168,0.2)` : "rgba(106,95,160,0.1)", border: running && phaseIdx===i ? `2px solid ${C.rose}` : `1px solid rgba(106,95,160,0.3)`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", transition:"all 0.4s" }}>
                                    <span style={{ fontSize:26, fontWeight:300, color: running&&phaseIdx===i ? C.rose : C.muted, lineHeight:1 }}>{running&&phaseIdx===i ? count : ph.dur}</span>
                                    <span style={{ fontSize:9, letterSpacing:"0.12em", color: running&&phaseIdx===i ? C.rose : C.muted, textTransform:"uppercase", marginTop:4 }}>{ph.phase}</span>
                                </div>
                                {i<2 && <div style={{ width:32, height:1, background:"rgba(232,160,168,0.2)" }}/>}
                            </div>
                        ))}
                    </div>
                    <div style={{ position:"relative", width:210, height:210, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:"1px solid rgba(106,95,160,0.2)" }}/>
                        <div style={{ position:"absolute", inset:18, borderRadius:"50%", border:`1.5px solid ${C.rose}`, transform:`scale(${circleScale})`, transition: running ? (p.label==="Sostén" ? "transform 0s" : `transform ${p.dur}s linear`) : "transform 0.5s ease", display:"flex", alignItems:"center", justifyContent:"center" }}>
                            <span style={{ fontFamily:"Georgia,serif", fontSize:30, fontWeight:300, color:C.rose }}>{running ? p.label : "·"}</span>
                        </div>
                    </div>
                    <div style={{ display:"flex", gap:16 }}>
                        <button onClick={start} style={{ background:running?C.rose:"transparent", border:`1px solid ${running?C.rose:"rgba(232,160,168,0.4)"}`, color:running?C.dark:C.rose, fontSize:14, padding:"10px 28px", cursor:"pointer", borderRadius: "6px" }}>Iniciar</button>
                        <button onClick={stop}  style={{ background:"transparent", border:"1px solid rgba(232,160,168,0.2)", color:C.muted, fontSize:14, padding:"10px 28px", cursor:"pointer", borderRadius: "6px" }}>Detener</button>
                    </div>
                </div>
            );
        }

        /* SLIDE 7 */
        function ReencuadreSlide({ visible }) {
            const rawIdeas = [{ t: "square", x: 85, y: 15, s: 12, r: 15, c: C.violet, o: 0.5 }, { t: "circle", x: 160, y: -5, s: 14, r: 0, c: C.rose, o: 0.8 }, { t: "square", x: 250, y: 15, s: 16, r: 45, c: C.text, o: 0.4 }, { t: "square", x: 120, y: 55, s: 18, r: -10, c: C.rose, o: 0.6 }, { t: "circle", x: 220, y: 65, s: 14, r: 0, c: C.violet, o: 0.7 }, { t: "square", x: 170, y: 80, s: 12, r: 45, c: C.rose, o: 0.9 }, { t: "square", x: 205, y: 105, s: 14, r: 20, c: C.text, o: 0.5 }, { t: "circle", x: 150, y: 120, s: 10, r: 0, c: C.violet, o: 0.8 }, { t: "circle", x: 170, y: 175, s: 8, r: 0, c: C.text, o: 1, glow: true }];
            return (
                <div style={{ textAlign:"center", maxWidth:800, width:"100%" }}>
                    <p style={{ ...a(0.05,visible), fontSize:13, letterSpacing:"0.3em", textTransform:"uppercase", color:C.rose, marginBottom:20 }}>Reencuadre mental</p>
                    <h2 style={{ ...a(0.12,visible), fontFamily:"Georgia,serif", fontSize:"clamp(28px,4vw,52px)", fontWeight:300, color:C.text, marginBottom:15 }}>Antes de la presentación</h2>
                    <p style={{ ...a(0.18,visible), fontSize:16, color:C.muted, marginBottom:32, lineHeight:1.7 }}>El proceso de filtrar hasta quedarte con <span style={{ color:C.rose }}>3 ideas clave</span>.</p>
                    <div style={{ position:"relative", width:400, height:320, margin:"0 auto 40px" }}>
                        <div style={{ ...a(0.25,visible), position:"absolute", top:30, left:0, right:0, height:240, zIndex:1 }}>
                            {rawIdeas.map((shape, i) => (
                                <div key={i} style={{ position:"absolute", left: (shape.x * 1.15) - shape.s/2, top: (shape.y * 1.15) - shape.s/2, width:shape.s*1.2, height:shape.s*1.2, borderRadius: shape.t === "circle" ? "50%" : "2px", background: shape.c, opacity:shape.o, transform: `rotate(${shape.r}deg)`, boxShadow: shape.glow ? `0 0 16px 3px ${shape.c}` : "none" }}/>
                            ))}
                        </div>
                        <div style={{ ...a(0.4,visible), position:"absolute", top:30, left:0, zIndex:2, width:"100%", height:"100%" }}>
                            <svg width="400" height="240" viewBox="0 0 340 200" preserveAspectRatio="xMidYMid meet">
                                <path d="M 170 160 Q 135 175 100 186" fill="none" stroke="rgba(106,95,160,0.6)" strokeWidth="1" strokeDasharray="3 3"/><path d="M 170 160 L 170 186" fill="none" stroke="rgba(106,95,160,0.6)" strokeWidth="1" strokeDasharray="3 3"/><path d="M 170 160 Q 205 175 240 186" fill="none" stroke="rgba(106,95,160,0.6)" strokeWidth="1" strokeDasharray="3 3"/>
                                <path d="M 20 20 A 150 18 0 0 1 320 20" fill="none" stroke="rgba(232,160,168,0.15)" strokeWidth="1"/><path d="M 62 56 A 108 13 0 0 1 278 56" fill="none" stroke="rgba(232,160,168,0.15)" strokeWidth="1"/><path d="M 104 93 A 66 8 0 0 1 236 93" fill="none" stroke="rgba(232,160,168,0.15)" strokeWidth="1"/><path d="M 145 130 A 25 4 0 0 1 195 130" fill="none" stroke="rgba(232,160,168,0.2)" strokeWidth="1"/>
                                {[0,1,2,3,4,5,6,7,8].map(i => <line key={`c-${i}`} x1={20 + i * 37.5} y1="20" x2={145 + i * 6.25} y2="130" stroke="rgba(232,160,168,0.3)" strokeWidth="1"/>)}
                                {[0,1,2,3,4,5,6,7,8].map(i => <line key={`s-${i}`} x1={145 + i * 6.25} y1="130" x2={145 + i * 6.25} y2="160" stroke="rgba(232,160,168,0.4)" strokeWidth="1"/>)}
                                <path d="M 20 20 A 150 18 0 0 0 320 20" fill="none" stroke="rgba(232,160,168,0.6)" strokeWidth="1.2"/><path d="M 145 130 A 25 4 0 0 0 195 130" fill="none" stroke="rgba(232,160,168,0.6)" strokeWidth="1.2"/><path d="M 145 160 A 25 4 0 0 0 195 160" fill="none" stroke="rgba(232,160,168,0.6)" strokeWidth="1.2"/>
                            </svg>
                        </div>
                        <div style={{ position:"absolute", top:245, left:"50%", transform:"translateX(-50%)", display:"flex", gap:34, zIndex:3 }}>
                            {["1", "2", "3"].map((num, i) => (
                                <div key={i} style={{ ...a(0.6 + i*0.15, visible), display:"flex", flexDirection:"column", alignItems:"center", gap:12 }}>
                                    <div style={{ width:48, height:48, borderRadius:"50%", background:`linear-gradient(135deg, rgba(232,160,168,0.15) 0%, rgba(106,95,160,0.05) 100%)`, border:`1px solid rgba(232,160,168,0.4)`, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:`0 0 20px rgba(232,160,168,0.2)` }}>
                                        <div style={{ width:12, height:12, background:C.rose, transform:"rotate(45deg)" }}/>
                                    </div>
                                    <span style={{ fontSize:14, color:C.text, letterSpacing:"0.15em", fontFamily:"Georgia,serif" }}>Idea {num}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div style={{ ...a(1.05,visible), display:"flex", justifyContent:"center", alignItems:"center", gap:24 }}>
                        <div style={{ height:1, width:80, background:`linear-gradient(90deg, transparent, rgba(232,160,168,0.4))` }}/>
                        <p style={{ fontSize:16, color:C.silver, fontFamily:"Georgia,serif", fontStyle:"italic" }}>No más. No menos.</p>
                        <div style={{ height:1, width:80, background:`linear-gradient(90deg, rgba(232,160,168,0.4), transparent)` }}/>
                    </div>
                </div>
            );
        }

        /* SLIDE 8 */
        function QuoteSlide({ visible }) {
            return (
                <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", position:"relative" }}>
                    <div style={{ ...a(0.2, visible), position: "absolute", inset: "-80px", backgroundImage: "url('https://drive.google.com/thumbnail?id=1vzWcs3XMfDVg56h3_-x76BJK21wIBNvR&sz=w1280')", backgroundSize: "cover", backgroundPosition: "center", opacity: 0.35, filter: "grayscale(100%) brightness(0.65)", pointerEvents: "none", zIndex: 0 }} />
                    <div style={{ position:"absolute", inset:0, background: `radial-gradient(circle at center, transparent 10%, ${C.bg} 95%)`, opacity:0.8, zIndex:0 }} />
                    <div style={{ textAlign:"center", maxWidth:850, position: "relative", zIndex: 1 }}>
                        <p style={{ ...a(0.1,visible), fontSize:13, letterSpacing:"0.28em", textTransform:"uppercase", color:C.rose, marginBottom:24 }}>Pregunta poderosa</p>
                        <div style={{ ...a(0.2,visible), background:"rgba(12, 11, 24, 0.92)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border:`1px solid rgba(232,160,168,0.25)`, borderRadius:6, padding:"60px 50px", marginBottom:30, boxShadow: "0 25px 50px rgba(0,0,0,0.6)" }}>
                            <span style={{ fontFamily:"Georgia,serif", fontSize:"clamp(22px,3.2vw,42px)", fontWeight:300, fontStyle:"italic", color:C.text, lineHeight: 1.4 }}>
                                "Si tuvieras que explicar tu idea en una sola frase… ¿podrías hacerlo?"
                            </span>
                        </div>
                        <p style={{ ...a(0.5,visible), fontSize:17, color:C.silver, letterSpacing:"0.05em", textShadow: "0 2px 5px rgba(0,0,0,0.6)" }}>si no puedes, ahí está el problema.</p>
                    </div>
                </div>
            );
        }

        /* SLIDE 9 */
        function FinaleSlide({ visible }) {
            return (
                <div style={{ textAlign:"center", maxWidth:850 }}>
                    <p style={{ ...a(0.15,visible), fontFamily:"Georgia,serif", fontSize:"clamp(26px,5vw,64px)", fontWeight:300, color:C.text }}>El cerebro no escucha presentaciones.</p>
                    <p style={{ ...a(0.35,visible), fontFamily:"Georgia,serif", fontSize:"clamp(26px,5vw,64px)", fontWeight:300, color:C.rose, fontStyle:"italic", marginTop:10 }}>Escucha cosas que le importan.</p>
                </div>
            );
        }

        /* SLIDE 10 */
        function GraciasSlide({ visible }) {
            return (
                <div style={{ textAlign:"center" }}>
                    <h1 style={{ ...a(0.2,visible), fontFamily:"Georgia,serif", fontSize:"clamp(48px,7vw,84px)", fontWeight:300, color:C.text }}>¡Muchas <em style={{ color:C.rose }}>gracias!</em></h1>
                    <p style={{ ...a(0.4,visible), fontSize:18, color:C.muted, marginTop:30 }}>Por tu tiempo y atención.</p>
                </div>
            );
        }

        const SLIDES = [
            { id:1, component: HeroSlide }, { id:2, component: GridSlide }, { id:3, component: ClaridadSlide }, { id:4, component: VerbalSlide }, { id:5, component: NoVerbalSlide },
            { id:6, component: BreathingSlide }, { id:7, component: ReencuadreSlide }, { id:8, component: QuoteSlide }, { id:9, component: FinaleSlide }, { id:10, component: GraciasSlide }
        ];

        function App() {
            const [cur, setCur] = useState(0);
            const N = SLIDES.length;
            const goTo = (n) => { if (n >= 0 && n < N) setCur(n); };
            useEffect(() => {
                const h = (e) => { if (e.key==="ArrowRight"||e.key==="ArrowDown") goTo(cur+1); if (e.key==="ArrowLeft"||e.key==="ArrowUp") goTo(cur-1); };
                window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
            }, [cur]);
            return (
                <div style={{ width:"100%", height:"100%", background:C.bg, color:C.text, overflow:"hidden", position:"relative" }}>
                    <div style={{ position:"absolute", inset:0, pointerEvents:"none", background:"radial-gradient(ellipse 80% 60% at 70% 95%, rgba(106,95,160,0.18) 0%, transparent 60%), radial-gradient(ellipse 50% 35% at 15% 5%, rgba(232,160,168,0.07) 0%, transparent 55%)" }}/>
                    <div style={{ position:"absolute", top:0, left:0, height:3, width:`${((cur+1)/N)*100}%`, background:`linear-gradient(90deg, ${C.violet}, ${C.rose})`, transition:"width 0.5s ease", zIndex:10 }}/>
                    <div style={{ position:"absolute", top:24, right:32, fontSize:12, letterSpacing:"0.22em", color:C.muted, zIndex:20 }}>{String(cur+1).padStart(2,"0")} <span style={{ color:"rgba(138,134,168,0.3)" }}>/ {String(N).padStart(2,"0")}</span></div>
                    {SLIDES.map((slide,i) => { const Comp = slide.component; return <div key={slide.id} style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", padding:"60px 80px", opacity:i===cur?1:0, pointerEvents:i===cur?"all":"none", transition:"opacity 0.5s ease" }}><Comp visible={i===cur} /></div>; })}
                    <div style={{ position:"absolute", bottom:32, left:"50%", transform:"translateX(-50%)", display:"flex", alignItems:"center", gap:20, zIndex:20 }}>
                        <button onClick={()=>goTo(cur-1)} disabled={cur===0} style={{ background:"transparent", border:"1px solid rgba(232,160,168,0.25)", color:C.rose, width:44, height:44, cursor:"pointer", fontSize:18, opacity:cur===0?0.2:1, transition:"opacity 0.2s", borderRadius: "10px" }}>←</button>
                        <div style={{ display:"flex", gap:9 }}>{SLIDES.map((_,i) => <button key={i} onClick={()=>goTo(i)} style={{ width:i===cur?24:8, height:8, borderRadius:4, border:"none", cursor:"pointer", padding:0, background:i===cur?C.rose:"rgba(232,160,168,0.2)", transition:"all 0.3s", boxShadow:i===cur?`0 0 10px ${C.rose}`:"none" }}/>)}</div>
                        <button onClick={()=>goTo(cur+1)} disabled={cur===N-1} style={{ background:"transparent", border:"1px solid rgba(232,160,168,0.25)", color:C.rose, width:44, height:44, cursor:"pointer", fontSize:18, opacity:cur===N-1?0.2:1, transition:"opacity 0.2s", borderRadius: "10px" }}>→</button>
                    </div>
                    <div style={{ position:"absolute", bottom:40, left:40, fontSize:11, letterSpacing:"0.25em", color:C.muted, textTransform:"uppercase", zIndex:20 }}>Evelyn Fachler</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
